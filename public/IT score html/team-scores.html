<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1" />
    <title>Team Scores</title>
    <style>
      html,
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        position: relative;
      }

      .score {
        position: absolute;
        width: 180px;
        text-align: center;
        font-size: 72px;
        font-weight: 700;
        line-height: 1;
        color: #ffd400;
      }

      .team1 {
        left: 175px;
        top: 615px;
      }

      .team2 {
        left: 495px;
        top: 615px;
      }

      .team3 {
        left: 1245px;
        top: 615px;
      }

      .team4 {
        left: 1565px;
        top: 615px;
      }
    </style>
  </head>
  <body>
    <div class="score team1">000</div>
    <div class="score team2">000</div>
    <div class="score team3">000</div>
    <div class="score team4">000</div>
  </body>
</html>
